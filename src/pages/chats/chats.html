<ion-header>

  <ion-navbar>
    <ion-title>{{chatuser?.name}}</ion-title>
  </ion-navbar>

</ion-header>


<ion-content padding>

  <ion-list>
    <ion-list-header>
      USERS
    </ion-list-header>
    <ion-item *ngFor="let user of availableusers" (click)="goToChat(user)">
      <ion-avatar item-start>
        <img src="http://via.placeholder.com/16x16">
      </ion-avatar>
      <h2>{{user.friend || "Anonymous"}}</h2>

      <p>{{user.email}}</p>
    </ion-item>
    <ion-item>
      <button ion-button large block (click)="addFriend()">Add Friend</button>
    </ion-item>
  </ion-list>
  
</ion-content>
