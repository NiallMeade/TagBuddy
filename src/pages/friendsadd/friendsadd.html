<ion-header>

  <ion-navbar>
    <ion-title>friendsadd</ion-title>
  </ion-navbar>

</ion-header>


<ion-content padding>

<ion-list>
    <ion-item>
      <ion-label floating>Friend's email</ion-label>
      <ion-input type="text" [(ngModel)]="email" placeholder = "Friend's email"></ion-input>
    </ion-item>

    <ion-item>
      <button ion-button large block (click)="addUsername()">Add Friend</button>
    </ion-item>

    <ion-item>
      <button ion-button large block (click)="addNFC()">Add Friend via NFC</button>
    </ion-item>
    
</ion-list>

</ion-content>
